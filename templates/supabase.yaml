service: supabase
display_name: Supabase
category: cloud_infrastructure
signup_url: https://supabase.com/dashboard
auth_methods:
  - github_oauth

steps:
  - name: navigate_signup
    action: goto
    url: https://supabase.com/dashboard
    wait_for: "text=Sign in"

  - name: github_oauth
    action: click
    selector: "a:has-text('Continue with GitHub'), button:has-text('Continue with GitHub')"
    requires: github_authenticated
    wait_for: "url_contains=supabase.com"

  - name: create_new_project
    action: click
    selector: "a:has-text('New project'), button:has-text('New project')"
    wait_for: "text=Create a new project"

  - name: set_project_name
    action: fill
    selector: "input[id='project-name'], input[placeholder*='project']"
    value: "ubc-project"

  - name: set_db_password
    action: fill
    selector: "input[id='db-password'], input[type='password']"
    value: "{{generated_password}}"

  - name: select_region
    action: click
    selector: "button:has-text('East US'), button:has-text('us-east')"
    optional: true

  - name: create_project
    action: click
    selector: "button:has-text('Create new project')"
    wait_for: "text=Setting up"
    timeout_ms: 120000

credentials:
  - name: SUPABASE_URL
    type: connection_string
    location: settings
    path: https://supabase.com/dashboard/project/_/settings/api
    extraction:
      method: navigate_and_read
      steps:
        - name: navigate_api_settings
          action: goto
          url: https://supabase.com/dashboard/project/_/settings/api

        - name: capture_url
          action: capture
          selector: "input[id='project-url'], [data-testid='project-url'], span:has-text('https://')"

  - name: SUPABASE_ANON_KEY
    type: api_key
    location: settings
    path: https://supabase.com/dashboard/project/_/settings/api
    extraction:
      method: navigate_and_read
      steps:
        - name: capture_anon_key
          action: capture
          selector: "input[id='anon-key'], [data-testid='anon-key'], code:first-of-type"

  - name: SUPABASE_SERVICE_ROLE_KEY
    type: api_key
    location: settings
    path: https://supabase.com/dashboard/project/_/settings/api
    extraction:
      method: navigate_and_read
      steps:
        - name: reveal_service_key
          action: click
          selector: "button:has-text('Reveal')"
          optional: true

        - name: capture_service_key
          action: capture
          selector: "input[id='service-role-key'], [data-testid='service-role-key']"

  - name: SUPABASE_DB_URL
    type: connection_string
    location: settings
    path: https://supabase.com/dashboard/project/_/settings/database
    extraction:
      method: navigate_and_read
      steps:
        - name: navigate_db_settings
          action: goto
          url: https://supabase.com/dashboard/project/_/settings/database

        - name: capture_connection_string
          action: capture
          selector: "input[id='connection-string'], code:has-text('postgresql://')"

provides:
  - database
  - auth
  - edge_functions
  - realtime
  - storage
  - vector_embeddings

dependencies:
  - github

free_tier:
  limits:
    - name: Database Size
      value: 500
      unit: MB
    - name: Storage
      value: 1
      unit: GB
    - name: Edge Function Invocations
      value: 500000
      unit: per month
    - name: Auth MAUs
      value: 50000
      unit: per month
    - name: Realtime Messages
      value: 2000000
      unit: per month
