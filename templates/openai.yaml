service: openai
display_name: OpenAI API
category: ai_llm
signup_url: https://platform.openai.com/signup
auth_methods:
  - email_password
  - google_oauth

steps:
  - name: navigate_signup
    action: goto
    url: https://platform.openai.com/signup
    wait_for: "text=Create your account"

  - name: enter_email
    action: fill
    selector: "input[name='email'], input[type='email']"
    value: "{{user_email}}"

  - name: click_continue
    action: click
    selector: "button:has-text('Continue')"

  - name: enter_password
    action: fill
    selector: "input[name='password'], input[type='password']"
    value: "{{generated_password}}"

  - name: submit_signup
    action: click
    selector: "button:has-text('Continue'), button[type='submit']"

  - name: verify_email
    action: wait
    wait_for: "user_action"
    timeout_ms: 300000

  - name: complete_onboarding
    action: click
    selector: "button:has-text('Continue'), button:has-text('Get started')"
    optional: true

credentials:
  - name: OPENAI_API_KEY
    type: api_key
    location: dashboard
    path: https://platform.openai.com/api-keys
    extraction:
      method: create_and_capture
      steps:
        - name: navigate_api_keys
          action: goto
          url: https://platform.openai.com/api-keys

        - name: click_create
          action: click
          selector: "button:has-text('Create new secret key')"

        - name: set_key_name
          action: fill
          selector: "input[placeholder*='key'], input[name='name']"
          value: "ubc-key"

        - name: create_key
          action: click
          selector: "button:has-text('Create secret key'), button[type='submit']"

        - name: capture_key
          action: capture
          selector: "code, input[readonly], [data-testid='secret-key'], .key-display"

  - name: OPENAI_ORG_ID
    type: api_key
    location: settings
    path: https://platform.openai.com/settings/organization/general
    extraction:
      method: navigate_and_read
      steps:
        - name: navigate_org
          action: goto
          url: https://platform.openai.com/settings/organization/general

        - name: capture_org_id
          action: capture
          selector: "code:has-text('org-'), [data-testid='org-id']"

provides:
  - llm_api
  - embeddings
  - image_generation
  - speech_to_text
  - text_to_speech

free_tier:
  limits:
    - name: Free Credits
      value: 5
      unit: USD (one-time)
    - name: Rate Limit (GPT-3.5)
      value: 500
      unit: requests/minute
    - name: Rate Limit (GPT-4o-mini)
      value: 500
      unit: requests/minute
